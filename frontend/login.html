<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Đăng nhập - Audio AI Suite</title>
<link rel="stylesheet" href="/css/style.css">
</head>
<body class="dark">
  <div class="auth-wrap">
    <form id="login-form" class="auth-card">
      <h1>Audio AI Suite</h1>
      <p class="subtitle">Đăng nhập để tiếp tục</p>
      <input type="text" id="username" placeholder="Tài khoản" required autocomplete="username">
      <input type="password" id="password" placeholder="Mật khẩu" required autocomplete="current-password">
      <button type="submit">Đăng nhập</button>
      <p id="error-msg" class="error"></p>
    </form>
  </div>
  <script src="/js/login.js"></script>
</body>
</html>
